# Base — shared by local and production
# Local:      docker-compose up --build          (auto-loads docker-compose.override.yml)
# Production: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build: ./backend
    container_name: ziba_backend
    environment:
      - DB_HOST=${DB_HOST:-172.31.46.37}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-admin}
      - DB_NAME=${DB_NAME:-ziba}
      - DB_PORT=${DB_PORT:-5432}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: ziba_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
