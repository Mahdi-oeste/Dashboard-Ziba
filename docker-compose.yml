services:
  backend:
    build: ./backend
    container_name: ziba_backend
    environment:
      - DB_HOST=${DB_HOST:-172.31.46.37}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-admin}
      - DB_NAME=${DB_NAME:-ziba}
      - DB_PORT=${DB_PORT:-5432}
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - web-network

  frontend:
    build: ./frontend
    container_name: ziba_frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ziba.rule=Host(`zibareservaciones.oeste.mx`)"
      - "traefik.http.routers.ziba.entrypoints=websecure"
      - "traefik.http.routers.ziba.tls.certresolver=myresolver"
      - "traefik.http.services.ziba.loadbalancer.server.port=80"
    networks:
      - web-network

networks:
  web-network:
    external: false
