# Production — used with Traefik on the server
# Deploy: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  backend:
    networks:
      - web-network

  frontend:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ziba.rule=Host(`zibareservaciones.oeste.mx`)"
      - "traefik.http.routers.ziba.entrypoints=websecure"
      - "traefik.http.routers.ziba.tls.certresolver=myresolver"
      - "traefik.http.services.ziba.loadbalancer.server.port=80"
    networks:
      - web-network

networks:
  web-network:
    external: true
