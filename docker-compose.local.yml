# ============================================================================
#  ziba-calendar — Stack local (sin Traefik / sin TLS)
#
#  Uso:
#    1) Ajusta DATABASE_URL en .env si es necesario
#    2) docker compose -f docker-compose.local.yml up -d --build
#    3) http://localhost:8080
#    4) API directa: http://localhost:3001/healthz
#    5) Apagar: docker compose -f docker-compose.local.yml down
# ============================================================================

services:
  api:
    build:
      context: ./backend
    container_name: ziba_cal_api_local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?define DATABASE_URL en .env}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      PORT: '3001'
      CORS_ORIGINS: '*'
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ziba-cal-local

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
        VITE_ZIBA_API_URL: /api
        VITE_AUTH_DISABLED: 'false'
        VITE_AUTHORITY: 'https://auth.oeste.mx/realms/ziba-calendario'
        VITE_CLIENT_ID: 'ziba-frontend'
    container_name: ziba_cal_frontend_local
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - ziba-cal-local

networks:
  ziba-cal-local:
    driver: bridge
