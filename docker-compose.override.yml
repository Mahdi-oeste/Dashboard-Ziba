# Local development — loaded automatically by docker-compose up
# Exposes ports so the app is reachable at localhost:8080 / localhost:3000

services:
  backend:
    ports:
      - "3000:3000"
    networks:
      - ziba-local

  frontend:
    ports:
      - "8080:80"
    networks:
      - ziba-local

networks:
  ziba-local:
    driver: bridge
