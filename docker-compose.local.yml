# ============================================================================
#  ziba-calendar — Stack local (sin Traefik / sin TLS)
#
#  Uso:
#    1) docker compose -f docker-compose.local.yml up -d --build
#    2) http://localhost:8080
#    3) API directa: http://localhost:3001/healthz
#    4) Apagar: docker compose -f docker-compose.local.yml down
# ============================================================================

services:
  api:
    build:
      context: ./backend
    container_name: ziba_cal_api_local
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:admin@10.207.64.123:5432/ziba
      DB_SCHEMA: public
      PORT: '3001'
      CORS_ORIGINS: '*'
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ziba-cal-local

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
        VITE_ZIBA_API_URL: /api
        VITE_AUTH_DISABLED: 'false'
        VITE_AUTHORITY: 'https://auth.oeste.mx/realms/ziba-calendario'
        VITE_CLIENT_ID: 'ziba-frontend'
        VITE_GEMINI_API_KEY: 'AQ.Ab8RN6KQSsOxZD_wIJeRYKlknBY2hQd2rh-HKgoBnEGXqCj3rA'
    container_name: ziba_cal_frontend_local
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - ziba-cal-local

networks:
  ziba-cal-local:
    driver: bridge
